<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Census 1765 - Kahal Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; }
  #map { width: 100vw; height: 100vh; }

  .center-label {
    background: none !important;
    border: none !important;
    box-shadow: none !important;
    padding: 2px 4px !important;
    font-size: 11px;
    font-weight: 600;
    color: #1A1A2E;
    text-shadow:
      -1px -1px 0 rgba(255,255,255,0.85),
       1px -1px 0 rgba(255,255,255,0.85),
      -1px  1px 0 rgba(255,255,255,0.85),
       1px  1px 0 rgba(255,255,255,0.85),
       0 0 4px rgba(255,255,255,0.6);
    pointer-events: none !important;
    white-space: nowrap;
  }

  .legend {
    position: fixed; bottom: 20px; right: 12px; z-index: 1000;
    background: rgba(255,255,255,0.95); padding: 14px 18px;
    border-radius: 10px; font-size: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    max-width: 190px; backdrop-filter: blur(8px);
  }
  .legend h3 { margin-bottom: 10px; font-size: 13px; font-weight: 700; color: #1f2937; }
  .legend-section { margin-bottom: 8px; }
  .legend-title { font-size: 9px; text-transform: uppercase; letter-spacing: 0.06em;
    color: #9CA3AF; margin-bottom: 3px; font-weight: 600; }
  .legend-item { display: flex; align-items: center; gap: 8px; margin: 2px 0; color: #374151; font-size: 11px; }
  .legend-rect { width: 16px; height: 11px; border-radius: 2px; flex-shrink: 0; }
  .legend-circle { border-radius: 50%; display: inline-block; flex-shrink: 0; }
</style>
</head>
<body>
<div id="map"></div>
<div class="legend">
  <h3>Census 1765</h3>
  <div class="legend-section">
    <div class="legend-title">Voivodeships</div>
    <div class="legend-item"><span class="legend-rect" style="background:#C8D5B9;border:1px solid #8FA07A"></span>Rus</div>
    <div class="legend-item"><span class="legend-rect" style="background:#D4C5A9;border:1px solid #B0A07A"></span>Podolia</div>
    <div class="legend-item"><span class="legend-rect" style="background:#B8CCD8;border:1px solid #7A9DB8"></span>Kiev</div>
    <div class="legend-item"><span class="legend-rect" style="background:#D5BFD0;border:1px solid #A88CA0"></span>Volhynia</div>
    <div class="legend-item"><span class="legend-rect" style="background:#DBBFA0;border:1px solid #C09A6E"></span>Braclaw</div>
  </div>
  <div class="legend-section">
    <div class="legend-title">Type</div>
    <div class="legend-item"><span class="legend-circle" style="width:10px;height:10px;background:#2D3A4A;border:1.5px solid #fff;box-shadow:0 0 2px rgba(0,0,0,0.3)"></span>City</div>
    <div class="legend-item"><span class="legend-circle" style="width:8px;height:8px;background:#4A6741;border:1px solid #fff;box-shadow:0 0 2px rgba(0,0,0,0.2)"></span>Town</div>
    <div class="legend-item"><span class="legend-circle" style="width:5px;height:5px;background:#6B4C3B;border:0.5px solid #fff"></span>Village</div>
  </div>
  <div class="legend-section">
    <div class="legend-title">Population size</div>
    <div class="legend-item"><span class="legend-circle" style="width:16px;height:16px;background:#555;border:1px solid #fff"></span>1000+</div>
    <div class="legend-item"><span class="legend-circle" style="width:11px;height:11px;background:#555;border:1px solid #fff"></span>200-500</div>
    <div class="legend-item"><span class="legend-circle" style="width:7px;height:7px;background:#555;border:1px solid #fff"></span>50-100</div>
    <div class="legend-item"><span class="legend-circle" style="width:3px;height:3px;background:#555;border:1px solid #fff"></span>&lt; 5</div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const VIV_FILL = {
  'Rus':     '#C8D5B9',
  'Podolia': '#D4C5A9',
  'Kijow':   '#B8CCD8',
  'Wolyn':   '#D5BFD0',
  'Bracław': '#DBBFA0',
};
const VIV_STROKE = {
  'Rus':     '#8FA07A',
  'Podolia': '#B0A07A',
  'Kijow':   '#7A9DB8',
  'Wolyn':   '#A88CA0',
  'Bracław': '#C09A6E',
};

// Zoom-dependent scale factor — shrinks points at low zoom, grows at high zoom
// Base zoom = 9 (factor 1.0). At zoom 7 = ~0.4, zoom 6 = ~0.3
function zoomScale(zoom) {
  const BASE_ZOOM = 9;
  return Math.max(0.2, Math.min(1.5, Math.pow(1.5, (zoom - BASE_ZOOM))));
}

// Discrete size groups by population bracket
const POP_BRACKETS = [
  { max:    5, radius: 2 },
  { max:   10, radius: 3 },
  { max:   25, radius: 4 },
  { max:   50, radius: 5.5 },
  { max:  100, radius: 7 },
  { max:  200, radius: 9 },
  { max:  500, radius: 11 },
  { max: 1000, radius: 13.5 },
  { max: Infinity, radius: 16 },
];
function bracketRadius(pop) {
  if (!pop || pop <= 0) return 1.5;
  for (const b of POP_BRACKETS) {
    if (pop < b.max) return b.radius;
  }
  return 16;
}

async function init() {
  const map = L.map('map', { preferCanvas: true }).setView([49.2, 28.5], 7);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; CARTO', maxZoom: 18,
  }).addTo(map);

  const [bordersRes, pointsRes] = await Promise.all([
    fetch('borders_kahal_surroundings_rus_1765.geojson'),
    fetch('points_borders_kahal_surroundings_rus_1765.geojson'),
  ]);
  const borders = await bordersRes.json();
  const points = await pointsRes.json();

  // Separate centers and settlements
  const centers = { type: 'FeatureCollection', features: points.features.filter(f => f.properties.is_center === true) };
  const settlements = { type: 'FeatureCollection', features: points.features.filter(f => f.properties.is_center !== true) };

  // Pop ranges
  const centerPops = centers.features.map(f => f.properties.pop || 0).filter(p => p > 0);
  const settlePops = settlements.features.map(f => f.properties.pop || 0).filter(p => p > 0);
  const cMin = Math.min(...centerPops), cMax = Math.max(...centerPops);
  const sMin = Math.min(...settlePops), sMax = Math.max(...settlePops);

  // --- BORDERS (always visible) ---
  L.geoJSON(borders, {
    style: (feature) => {
      const viv = feature.properties.viv || 'None';
      return {
        fillColor: VIV_FILL[viv] || '#E0E0E0',
        color: VIV_STROKE[viv] || '#8A8A7A',
        weight: 1.5,
        fillOpacity: 0.25,
      };
    },
    onEachFeature: (feature, layer) => {
      const p = feature.properties;
      layer.bindPopup(`<div style="font-family:system-ui;font-size:13px">
        <b>${p.kahal}</b> <span style="color:#888">${p.he_name || ''}</span><br>
        <span style="color:#6b7280">${p.viv || ''}</span>
        <table style="margin-top:4px;font-size:12px"><tr><td style="color:#888;padding-right:8px">Jewish pop</td><td><b>${p.jewish_pop || 0}</b></td></tr>
        <tr><td style="color:#888">Total</td><td>${p.total || 0}</td></tr><tr><td style="color:#888">Places</td><td>${p.places || 0}</td></tr></table></div>`);
    },
  }).addTo(map);

  // Style by settlement type
  const TYPE_STYLE = {
    city:    { fill: '#2D3A4A', stroke: '#FFFFFF', strokeW: 1.5, opacity: 0.9 },
    town:    { fill: '#4A6741', stroke: '#FFFFFF', strokeW: 1.2, opacity: 0.85 },
    village: { fill: '#6B4C3B', stroke: '#FFFFFF', strokeW: 0.5, opacity: 0.7 },
  };

  // --- Build point layers as functions (rebuilt on zoom for efficient Canvas redraw) ---
  function makePointLayer(geojson, popupFn) {
    const zs = zoomScale(map.getZoom());
    return L.geoJSON(geojson, {
      pointToLayer: (feature, latlng) => {
        const pop = feature.properties.pop || 0;
        const type = feature.properties.settlement_type || 'village';
        const ts = TYPE_STYLE[type] || TYPE_STYLE.village;
        return L.circleMarker(latlng, {
          radius: bracketRadius(pop) * zs,
          fillColor: ts.fill,
          color: ts.stroke,
          weight: Math.max(0.3, ts.strokeW * zs),
          fillOpacity: ts.opacity,
        });
      },
      onEachFeature: (feature, layer) => {
        layer.bindPopup(popupFn(feature.properties));
      },
    });
  }

  function centerPopup(p) {
    return `<div style="font-family:system-ui;font-size:13px">
      <div style="font-size:15px;font-weight:700;color:#1A1A2E;margin-bottom:4px">${p.name}</div>
      <div style="font-size:12px;color:#888;margin-bottom:6px">${p.name_he || ''} &middot; ${p.kahal} Kahal</div>
      <table style="font-size:12px"><tr><td style="color:#888;padding-right:8px">Jewish pop</td><td><b>${p.pop || 0}</b></td></tr>
      <tr><td style="color:#888">Type</td><td>${p.settlement_type || ''}</td></tr>
      <tr><td style="color:#888">Modern</td><td>${p.modern_name || ''}</td></tr></table></div>`;
  }
  function settlePopup(p) {
    return `<b>${p.name}</b><br>Kahal: ${p.kahal}<br>Pop: ${p.pop || 0}`;
  }

  let settlementsLayer = makePointLayer(settlements, settlePopup).addTo(map);
  let centersLayer = makePointLayer(centers, centerPopup).addTo(map);

  // --- CENTER LABELS (top-N by pop) ---
  const sortedCenters = [...centers.features].sort((a, b) => (b.properties.pop || 0) - (a.properties.pop || 0));

  const LABEL_TIERS = [
    { minZoom: 0, count: 30 },
    { minZoom: 7, count: 80 },
    { minZoom: 8, count: 150 },
    { minZoom: 9, count: 999 },
  ];

  const labelGroups = LABEL_TIERS.map(tier => {
    const group = L.layerGroup();
    sortedCenters.slice(0, tier.count).forEach(f => {
      const coords = f.geometry.coordinates;
      L.tooltip({
        permanent: true, direction: 'top', className: 'center-label', offset: [0, -6],
      }).setContent(f.properties.name).setLatLng([coords[1], coords[0]]).addTo(group);
    });
    return { group, minZoom: tier.minZoom };
  });

  // --- ZOOM MANAGEMENT — rebuild layers instead of per-marker updates ---
  let lastZoom = map.getZoom();
  function updateVisibility() {
    const z = map.getZoom();

    // Label tiers
    let bestIdx = 0;
    for (let i = LABEL_TIERS.length - 1; i >= 0; i--) {
      if (z >= LABEL_TIERS[i].minZoom) { bestIdx = i; break; }
    }
    labelGroups.forEach(({ group }, i) => {
      if (i === bestIdx) { if (!map.hasLayer(group)) map.addLayer(group); }
      else { if (map.hasLayer(group)) map.removeLayer(group); }
    });

    // Only rebuild point layers if zoom actually changed
    if (z !== lastZoom) {
      lastZoom = z;
      map.removeLayer(settlementsLayer);
      map.removeLayer(centersLayer);
      settlementsLayer = makePointLayer(settlements, settlePopup).addTo(map);
      centersLayer = makePointLayer(centers, centerPopup).addTo(map);
    }
  }

  // --- ZOOM-RESPONSIVE LABEL SIZE ---
  const labelStyle = document.createElement('style');
  document.head.appendChild(labelStyle);
  function updateLabelSize() {
    const zs = zoomScale(map.getZoom());
    const size = Math.max(7, Math.min(14, 11 * zs));
    labelStyle.textContent = `.center-label { font-size: ${size.toFixed(1)}px !important; }`;
  }

  // Debounce to avoid thrashing on rapid zoom
  let zoomTimer = null;
  map.on('zoomend', () => {
    if (zoomTimer) clearTimeout(zoomTimer);
    zoomTimer = setTimeout(() => {
      updateVisibility();
      updateLabelSize();
    }, 80);
  });
  updateVisibility();
  updateLabelSize();

  console.log(`Loaded: ${centers.features.length} centers, ${settlements.features.length} settlements (${largePop.length} large, ${mediumPop.length} medium, ${smallPop.length} small, ${tinyPop.length} tiny)`);
}

init().catch(err => console.error('Init error:', err));
</script>
</body>
</html>
